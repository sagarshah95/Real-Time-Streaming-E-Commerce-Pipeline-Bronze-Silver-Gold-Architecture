version: '3.8'

networks:
  lakehouse-net:
    driver: bridge

services:

  # ── Kafka (KRaft, no ZooKeeper) ──────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.8.3
    container_name: kafka
    networks:
      - lakehouse-net
    ports:
      - "29092:29092"   # host machine access  → localhost:29092
      # port 9092 is internal only (Spark → kafka:9092), not exposed to host
    environment:
      KAFKA_KRAFT_MODE: 'true'
      CLUSTER_ID: '1L6g7nGhU-eAKfL--X25wo'
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      # dual-listener: PLAINTEXT for inter-container, PLAINTEXT_HOST for host machine
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    volumes:
      - kafka_kraft:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── MinIO (local S3-compatible storage for Delta Lake) ───────────────────
  minio:
    image: minio/minio:latest
    container_name: minio-lakehouse
    networks:
      - lakehouse-net
    ports:
      - "9000:9000"   # S3 API  → http://localhost:9000
      - "9001:9001"   # Web UI  → http://localhost:9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── MinIO init: creates the 'lakehouse' bucket on first start ─────────────
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    networks:
      - lakehouse-net
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb local/lakehouse --ignore-existing &&
        echo 'Bucket lakehouse ready'
      "

  # ── Spark Master ──────────────────────────────────────────────────────────
  spark-master:
    build: .
    container_name: spark-master
    networks:
      - lakehouse-net
    ports:
      - "8080:8080"   # Spark Web UI → http://localhost:8080
      - "7077:7077"   # Spark submit endpoint
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    env_file:
      - .env
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_MASTER_HOST=spark-master
    volumes:
      - ./spark_jobs:/opt/spark_jobs
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ── Spark Worker ──────────────────────────────────────────────────────────
  spark-worker:
    build: .
    container_name: spark-worker
    networks:
      - lakehouse-net
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    env_file:
      - .env
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_WORKER_MEMORY=6g
      - SPARK_WORKER_CORES=4
    volumes:
      - ./spark_jobs:/opt/spark_jobs
    depends_on:
      - spark-master

volumes:
  kafka_kraft:
  minio_data: